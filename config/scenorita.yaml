aws:
  region: us-west-2
  profile: null

defaults:
  instance:
    ami_id: ami-0c8b91bf148916bbf
    instance_type: c5a.16xlarge
    subnet_id: subnet-0453f9f4c07f82926
    security_group_ids:
      - sg-0b9124a453488edb1
    associate_public_ip_address: true
    iam_instance_profile: null
    volume_size_gb: 100
    volume_type: gp3
    root_device_name: /dev/sda1
    delete_on_termination: true
    encrypted: true
    iops: 3000
    kms_key_id: arn:aws:kms:us-west-2:314146320156:key/af838817-c494-4fda-b89b-b07547475801
    snapshot_id: snap-04bb425f883a364c7
    throughput: 125
    private_dns_name_options:
      HostnameType: ip-name
      EnableResourceNameDnsARecord: false
      EnableResourceNameDnsAAAARecord: false
    tags:
      Project: cadri
      Generator: scenorita
  empty_instance:
    s3_file_systems:
      - id: fs-0b9d7671fb53cf3c5
        mount_point: /mnt/s3/fs1
    tags:
      Role: general-purpose

generator:
  name: scenorita
  working_directory: /opt/cadri/scenorita
  command: . .venv/bin/activate && python main_ga.py
  results_directory: /opt/cadri/scenorita/results
  log_file: /var/log/cadri-scenorita.log
  s3_file_systems:
    - id: fs-0b9d7671fb53cf3c5
      mount_point: /mnt/s3/fs1
  s3_bucket: null
  s3_prefix: cadri/scenorita/results
